# Flux Kustomization to deploy Eclipse Che from the cluster manifests
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: eclipse-che
  namespace: flux-system
spec:
  interval: 10m
  dependsOn:
    - name: ingress-nginx
  path: ./clusters/dev/eclipse-che
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: eclipse-che
      namespace: eclipse-che
  timeout: 10m
