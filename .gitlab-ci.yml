    - terraform destroy -auto-approve
    - echo "✅ PREPROD destroy complete"
  only:
    - main
  when: manual
  environment:
    name: preprod
    action: stop

# ==== TARGETED DESTROY JOBS ====

destroy_aks_dev:
  stage: destroy
  variables:
    TF_ROOT: "${CI_PROJECT_DIR}/DevOps/environments/dev"
  script:
    - echo "⚠️  Destroying only AKS in DEV (keeping storage account)..."
    - terraform init
    - terraform destroy -target=module.aks -auto-approve
    - echo "✅ DEV AKS destroyed (storage account preserved)"
  only:
    - main
  when: manual
  environment:
    name: dev

destroy_aks_preprod:
  stage: destroy
  variables:
    TF_ROOT: "${CI_PROJECT_DIR}/DevOps/environments/preprod"
  script:
    - echo "⚠️  Destroying only AKS in PREPROD (keeping storage account)..."
    - terraform init
    - terraform destroy -target=module.aks -auto-approve
    - echo "✅ PREPROD AKS destroyed (storage account preserved)"
  only:
    - main
  when: manual
  environment:
    name: preprod

# ==== DESTROY EVERYTHING ====

destroy_all_dev:
  stage: destroy
  variables:
    TF_ROOT: "${CI_PROJECT_DIR}/DevOps/environments/dev"
  script:
    - echo "🔥 DESTROYING EVERYTHING IN DEV..."
    - echo ""
    - echo "Step 1: Installing kubectl..."
    - curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
    - chmod +x kubectl && mv kubectl /usr/local/bin/
    - echo ""
    - echo "Step 2: Connecting to AKS cluster..."
    - az aks get-credentials --resource-group rg-dev-2026 --name aks-dev-2026 --overwrite-existing || echo "AKS not found, skipping kubectl cleanup"
    - echo ""
    - echo "Step 3: Deleting Flux-deployed apps..."
    - kubectl delete namespace demo --ignore-not-found=true || echo "Namespace demo not found"
    - kubectl delete namespace flux-system --ignore-not-found=true || echo "Namespace flux-system not found"
    - echo ""
    - echo "Step 4: Destroying Terraform infrastructure..."
    - terraform init
    - terraform destroy -auto-approve
    - echo ""
    - echo "✅ DEV environment completely destroyed!"
  only:
    - main
  when: manual
  environment:
    name: dev
    action: stop

destroy_all_preprod:
  stage: destroy
  variables:
    TF_ROOT: "${CI_PROJECT_DIR}/DevOps/environments/preprod"
  script:
    - echo "🔥 DESTROYING EVERYTHING IN PREPROD..."
    - echo ""
    - echo "Step 1: Installing kubectl..."
    - curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
    - chmod +x kubectl && mv kubectl /usr/local/bin/
    - echo ""
    - echo "Step 2: Connecting to AKS cluster..."
    - az aks get-credentials --resource-group rg-preprod-2026 --name aks-preprod-2026 --overwrite-existing || echo "AKS not found, skipping kubectl cleanup"
    - echo ""
    - echo "Step 3: Deleting Flux-deployed apps..."
    - kubectl delete namespace demo --ignore-not-found=true || echo "Namespace demo not found"
    - kubectl delete namespace flux-system --ignore-not-found=true || echo "Namespace flux-system not found"
    - echo ""
    - echo "Step 4: Destroying Terraform infrastructure..."
    - terraform init
    - terraform destroy -auto-approve
    - echo ""
    - echo "✅ PREPROD environment completely destroyed!"
  only:
    - main
  when: manual
  environment:
    name: preprod
    action: stop
