apply_preprod:
  stage: apply
  variables:
    TF_ROOT: "${CI_PROJECT_DIR}/DevOps/environments/preprod"
  script:
    - echo "🚀 Applying PREPROD environment..."
    - terraform init
    - rm -f tfplan  # Delete old plan in case code changed
    - terraform plan -out=tfplan
    - terraform apply -auto-approve tfplan
    - echo ""
    - echo "✅ PREPROD Deployment successful!"
    - echo ""
    - echo "Cluster Details:"
    - terraform output
  dependencies:
    - plan_preprod
  only:
    - main
  when: manual
